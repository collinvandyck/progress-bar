name: Deploy Demo to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build WASM
        run: |
          go mod vendor
          cp wasm/patches/tty_js.go wasm/patches/signals_js.go vendor/github.com/charmbracelet/bubbletea/
          cp wasm/patches/console_js.go vendor/github.com/containerd/console/
          GOOS=js GOARCH=wasm go build -mod=vendor -ldflags="-s -w" -o wasm/web/progressbar.wasm ./wasm/
          cp "$(go env GOROOT)/lib/wasm/wasm_exec.js" wasm/web/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: wasm/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
